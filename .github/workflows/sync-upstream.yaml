name: Sync upstream

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: git remote add upstream https://github.com/chartdb/chartdb.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for existing sync PR
        id: existing_pr
        run: |
          PR_URL=$(gh pr list --label sync-upstream --state open --json url --jq '.[0].url // empty')
          if [ -n "$PR_URL" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Sync PR already open: $PR_URL"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Try merge
        if: steps.existing_pr.outputs.exists == 'false'
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
              echo "status=up-to-date" >> "$GITHUB_OUTPUT"
            else
              echo "status=clean" >> "$GITHUB_OUTPUT"
            fi
          else
            git merge --abort
            echo "status=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push clean merge
        if: steps.merge.outputs.status == 'clean'
        run: git push origin main

      - name: Create PR on conflict
        if: steps.merge.outputs.status == 'conflict'
        run: |
          BRANCH="sync-upstream/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-commit --no-ff || true
          git add -A
          git commit -m "chore: sync upstream (conflicts need resolving)"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync upstream (merge conflicts)" \
            --body "Automatic upstream sync has merge conflicts that need manual resolution." \
            --label "sync-upstream" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
